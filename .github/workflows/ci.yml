name: CI

on:
  push:
    branches: [ main, 'codex/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: frontend/.nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt stays loose for maintainers; CI installs the verified lock.
          pip install -r requirements.lock

      - name: Lint (ruff)
        run: ruff check . ../tools

      - name: Run backend tests
        run: python -m pytest

  launchers:
    name: Launchers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Validate Unix launchers
        if: runner.os != 'Windows'
        run: |
          bash -n start.sh
          bash -n start.command

      - name: Validate Windows launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $script = Get-Content -Raw .\start.ps1
          [scriptblock]::Create($script) | Out-Null
