<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Reader Canonical UI Proposal</title>
  <style>
    :root {
      --bg: #08090b;
      --surface: #11141a;
      --surface-2: #171b22;
      --line: #29303a;
      --muted: #9aa4b2;
      --text: #f4f7fb;
      --accent: #38bdf8;
      --success: #22c55e;
      --danger: #fb7185;
      --radius: 8px;
      --gap: 16px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 var(--font);
    }

    button, input, select, textarea {
      font: inherit;
    }

    h1, h2, h3, h4, p { margin: 0; }

    h1 { font-size: 18px; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    .controls {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 20px;
      border-right: 1px solid var(--line);
      background: #0c0f14;
    }

    .eyebrow {
      margin-top: 24px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .tabs {
      display: grid;
      gap: 8px;
    }

    .tab, .btn, .icon-btn, select, input[type="search"], textarea {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
    }

    .tab, .btn, .icon-btn {
      cursor: pointer;
    }

    .tab {
      padding: 10px 12px;
      text-align: left;
    }

    .tab.active {
      border-color: var(--accent);
      background: #172635;
    }

    .field {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    select, input[type="search"], textarea {
      width: 100%;
      padding: 10px;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
      color: #d5dbe5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .copy-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .main {
      min-width: 0;
      padding: 24px;
      overflow: auto;
    }

    .preview {
      width: min(100%, 1160px);
      min-height: 760px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #0b0d11;
      box-shadow: 0 18px 60px rgba(0, 0, 0, .35);
    }

    .app-nav {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: #10141b;
    }

    .logo {
      font-weight: 750;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-link {
      padding: 7px 10px;
      border-radius: var(--radius);
      color: var(--muted);
    }

    .nav-link.active {
      background: #1b2430;
      color: var(--text);
    }

    .content {
      padding: 28px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 34px;
      line-height: 1.1;
      font-weight: 760;
    }

    .reader-title {
      font-size: 27px;
      line-height: 1.18;
      font-weight: 740;
    }

    .muted {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      white-space: nowrap;
    }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #061016;
      font-weight: 720;
    }

    .success {
      border-color: #256d3b;
      background: #14351f;
      color: #b7f7c8;
    }

    .icon-btn {
      width: 36px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .badge, .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.ok, .pill.active {
      color: #b7f7c8;
      border-color: #256d3b;
      background: #102918;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--gap);
      margin-bottom: 16px;
    }

    .stat, .bar, .card, .reader-index, .chapter, .panel, .current-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .stat {
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .bar {
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .pill-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
    }

    .thumb {
      aspect-ratio: 16/9;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(56,189,248,.22), rgba(34,197,94,.08)),
        repeating-linear-gradient(90deg, #18202a 0 12px, #111820 12px 24px);
      position: relative;
    }

    .thumb::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      height: 28%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
    }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .card-title {
      min-height: 46px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .card-actions {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 36px;
      gap: 8px;
    }

    .reader-layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 720px);
      gap: 22px;
      align-items: start;
    }

    .reader-index {
      position: sticky;
      top: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .index-row {
      display: grid;
      grid-template-columns: 45px minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      border-radius: var(--radius);
      color: var(--muted);
    }

    .index-row.active {
      background: #1b2430;
      color: var(--text);
    }

    .article {
      max-width: 72ch;
      display: grid;
      gap: 16px;
    }

    .hero-image, .chapter-image {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 20% 18%, rgba(56,189,248,.26), transparent 24%),
        linear-gradient(135deg, #15202a, #0c1118 60%);
    }

    .hero-image {
      aspect-ratio: 16/7;
    }

    .chapter {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .chapter h4 {
      font-size: 20px;
      line-height: 1.2;
    }

    .chapter-image {
      aspect-ratio: 16/8;
    }

    .chapter-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 6px;
      border-top: 1px solid var(--line);
    }

    .slicer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 16px;
      align-items: start;
    }

    .step-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .step {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
    }

    .step.active {
      border-color: var(--accent);
      color: var(--text);
      background: #172635;
    }

    .video {
      aspect-ratio: 16/9;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, transparent 55%, rgba(0,0,0,.35)),
        repeating-linear-gradient(90deg, #151b24 0 18px, #0f141b 18px 36px);
      position: relative;
    }

    .timeline {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 22px;
      height: 8px;
      border-radius: 999px;
      background: #2a3441;
    }

    .timeline::after {
      content: "";
      position: absolute;
      left: 22%;
      width: 18%;
      top: -4px;
      bottom: -4px;
      border-radius: 999px;
      background: var(--accent);
    }

    .panel {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .frame-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .frame {
      aspect-ratio: 16/10;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #141b24;
      position: relative;
    }

    .frame.selected::after {
      content: "";
      position: absolute;
      inset: 5px;
      border: 2px solid var(--success);
      border-radius: 4px;
    }

    .current-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 32px;
    }

    .current-card {
      min-height: 660px;
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto auto;
      gap: 14px;
    }

    .url-block {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      color: var(--accent);
      background: rgba(255,255,255,.04);
      overflow-wrap: anywhere;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .controls { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .project-grid, .current-grid, .reader-layout, .slicer-layout, .search-row { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .page-head { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="controls">
      <h1>Smart Reader UI Proposal</h1>
      <p class="muted">Canonical proposed design for approval.</p>

      <div class="eyebrow">Screen</div>
      <div class="tabs" role="tablist" aria-label="Screen">
        <button class="tab active" data-screen="dashboard">Dashboard</button>
        <button class="tab" data-screen="reader">Reader</button>
        <button class="tab" data-screen="slicer">Slicer</button>
      </div>

      <div class="eyebrow">Comparison</div>
      <div class="field">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="proposed">Proposed</option>
          <option value="current">Current baseline</option>
        </select>
      </div>

      <div class="eyebrow">Implementation Prompt</div>
      <textarea id="prompt" readonly></textarea>
      <div class="copy-row">
        <button class="btn primary" id="copy">Copy Prompt</button>
        <span class="muted" id="copyStatus"></span>
      </div>
    </aside>

    <main class="main">
      <div class="preview" id="preview"></div>
    </main>
  </div>

  <script>
    const jobs = [
      ['Order Flow Footprint Trading Digest', 'AI Digest', 'complete', 'May 11, 2026'],
      ['I Studied Order Flow Trading for 5 Years — Footprint Charts Beat Everything', 'Source Archive', 'complete', 'May 11, 2026'],
      ['Structure and Volume Confluence Model', 'AI Summary', 'complete', 'May 10, 2026'],
      ['Daily Trade Planning Framework', 'AI Digest', 'complete', 'May 10, 2026'],
      ['Volume Profile Trade Models', 'Source Archive', 'complete', 'May 10, 2026'],
      ['Rethinking AI Agents: The Rise of Harness Engineering', 'Source Archive', 'complete', 'Apr 14, 2026']
    ];

    const chapters = [
      ['0:00', 'Limitations of Candlestick Charts'],
      ['2:16', 'Reading Footprint Chart Structure'],
      ['3:14', 'Delta as the First Filter'],
      ['4:20', 'Delta Divergence and Exhaustion']
    ];

    const state = {
      screen: 'dashboard',
      mode: 'proposed',
      selectedCount: 2
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => [...document.querySelectorAll(selector)];

    function app(content, active) {
      return `
        <nav class="app-nav">
          <div class="logo">Smart Reader</div>
          <div class="nav-links">
            <span class="nav-link ${active === 'new' ? 'active' : ''}">New Project</span>
            <span class="nav-link ${active === 'dashboard' ? 'active' : ''}">Dashboard</span>
          </div>
        </nav>
        <div class="content">${content}</div>
      `;
    }

    function proposedDashboard() {
      return app(`
        <header class="page-head">
          <div>
            <div class="page-title">Learning library</div>
            <p class="muted">Search, group, share, and open projects without printing long URLs on every card.</p>
          </div>
          <button class="btn primary">New Project</button>
        </header>

        <section class="stats">
          <div class="stat"><strong>23</strong><span class="muted">Projects</span></div>
          <div class="stat"><strong>7</strong><span class="muted">AI digests</span></div>
          <div class="stat"><strong>2</strong><span class="muted">Selected</span></div>
          <div class="stat"><strong>4.8GB</strong><span class="muted">Archives</span></div>
        </section>

        <section class="search-row">
          <input type="search" aria-label="Search projects" placeholder="Search projects">
          <div class="pill-row">
            <span class="pill active">All</span>
            <span class="pill">Complete</span>
            <span class="pill">Processing</span>
            <span class="pill">Failed</span>
          </div>
          <select aria-label="Sort projects"><option>Newest first</option><option>Oldest first</option><option>Title A-Z</option></select>
        </section>

        ${state.selectedCount > 0 ? `
          <section class="bar">
            <strong>${state.selectedCount} selected for group digest</strong>
            <div class="toolbar">
              <button class="btn">Clear</button>
              <button class="btn success">Copy Group AI Digest Task</button>
            </div>
          </section>
        ` : ''}

        <section class="project-grid">
          ${jobs.map((job, index) => `
            <article class="card">
              <div class="thumb"></div>
              <div class="card-body">
                <div class="meta">
                  <span class="badge ok">${job[2]}</span>
                  <span class="badge">${job[1]}</span>
                  ${index < state.selectedCount ? '<span class="badge ok">Grouped</span>' : ''}
                </div>
                <div class="card-title">${job[0]}</div>
                <p class="muted">${job[3]}</p>
              </div>
              <div class="card-actions">
                <button class="btn primary">Open Project</button>
                <button class="btn">Open YouTube</button>
                <button class="icon-btn" aria-label="Project actions">⋯</button>
              </div>
            </article>
          `).join('')}
        </section>
      `, 'dashboard');
    }

    function currentDashboard() {
      return app(`
        <header class="page-head">
          <div>
            <div class="page-title">Your Projects</div>
            <p class="muted">Manage and view your analyzed videos</p>
          </div>
          <button class="btn primary">+ New Project</button>
        </header>
        <section class="bar">
          <input value="Combined Learning Digest" aria-label="Group digest title">
          <button class="btn">Copy Group AI Digest CLI Task (0)</button>
          <button class="btn">Clear Group</button>
        </section>
        <section class="current-grid">
          ${jobs.slice(0, 3).map(job => `
            <article class="current-card">
              <div class="thumb"></div>
              <div class="meta"><span class="badge ok">${job[2]}</span><span class="badge">${job[1]}</span></div>
              <h3>${job[0]}</h3>
              <p class="muted">${job[3]}</p>
              <button class="btn primary">Open Project</button>
              <button class="btn">Add to Group</button>
              <div class="url-block">Tailscale Link: http://100.100.104.91:3001/reader/de00255f-fb48-4036-81e7-dafe9f613869</div>
              <div class="toolbar"><button class="btn">Copy Tailscale Link</button><button class="btn">Open YouTube</button><button class="btn">Download ZIP</button></div>
            </article>
          `).join('')}
        </section>
      `, 'dashboard');
    }

    function proposedReader() {
      return app(`
        <header class="page-head">
          <div>
            <div class="toolbar" style="margin-bottom:8px;"><span class="badge ok">AI Digest</span><span class="badge ok">complete</span></div>
            <div class="reader-title">Order Flow Footprint Trading Digest</div>
          </div>
        </header>

        <section class="bar">
          <div class="toolbar">
            <button class="btn primary">Copy Learning Prompt</button>
            <button class="btn">Copy Project Link</button>
            <button class="btn">Open YouTube</button>
            <button class="btn">Open Slicer</button>
          </div>
          <button class="icon-btn" aria-label="Reader overflow actions">⋯</button>
        </section>

        <section class="reader-layout">
          <aside class="reader-index">
            <strong>Chapters</strong>
            ${chapters.map((chapter, index) => `
              <div class="index-row ${index === 1 ? 'active' : ''}"><span>${chapter[0]}</span><span>${chapter[1]}</span></div>
            `).join('')}
          </aside>
          <article class="article">
            <div class="hero-image"></div>
            ${chapters.map(chapter => `
              <section class="chapter">
                <h4>${chapter[1]}</h4>
                <p class="muted">Compact transcript-grounded summary for this concept, with the visual evidence grouped below the explanation.</p>
                <p>Article text remains capped at a readable 72ch. Utility actions are outside the heading so chapter titles stay clean and scannable.</p>
                <div class="chapter-image"></div>
                <div class="chapter-footer">
                  <button class="btn">Improve images</button>
                  <button class="btn">Curated - remove</button>
                </div>
              </section>
            `).join('')}
          </article>
        </section>
      `, 'dashboard');
    }

    function currentReader() {
      return app(`
        <header class="page-head">
          <div>
            <h2>Smart Reader</h2>
            <div class="reader-title">Order Flow Footprint Trading Digest</div>
            <p class="muted">AI Digest Version from b8678493</p>
          </div>
          <div class="toolbar">
            <span class="badge ok">complete</span>
            <button class="btn">Copy AI Digest CLI Task</button>
            <button class="btn">Copy Text-Only AI Digest Task</button>
            <button class="btn">Copy Learning Prompt</button>
            <button class="btn">Copy Project Link</button>
            <button class="btn">Open YouTube</button>
            <button class="btn">Download Project ZIP</button>
            <button class="btn">Open Slicer</button>
          </div>
        </header>
        <article class="article" style="max-width:none;">
          <div class="hero-image"></div>
          ${chapters.map(chapter => `
            <section class="chapter">
              <h4>${chapter[1]} <span class="muted">Improve images · curated - remove</span></h4>
              <p class="muted">Current full-width chapter text and images run without a sticky chapter index.</p>
              <p>Long text spans the available content width, while project actions remain crowded in the header area.</p>
              <div class="chapter-image"></div>
            </section>
          `).join('')}
        </article>
      `, 'dashboard');
    }

    function proposedSlicer() {
      return app(`
        <header class="page-head">
          <div>
            <div class="page-title">Choose teaching frames</div>
            <p class="muted">A visible 3-step workflow keeps range selection, review, and export state clear.</p>
          </div>
          <button class="btn">Back to Project</button>
        </header>
        <div class="step-strip">
          <div class="step">1. Set range</div>
          <div class="step active">2. Review frames</div>
          <div class="step">3. Done</div>
        </div>
        <section class="slicer-layout">
          <div class="panel">
            <div class="video"><div class="timeline"></div></div>
            <h3>Review frames</h3>
            <div class="frame-grid">
              ${Array.from({ length: 12 }, (_, i) => `<div class="frame ${[1,3,4,7,10].includes(i) ? 'selected' : ''}"></div>`).join('')}
            </div>
          </div>
          <aside class="panel">
            <h3>Format</h3>
            <button class="btn success">Export Ready!</button>
            <p class="muted">5 frames selected</p>
            <button class="btn primary">Save to project</button>
            <button class="btn">Download ZIP</button>
          </aside>
        </section>
      `, 'dashboard');
    }

    function currentSlicer() {
      return app(`
        <header class="page-head">
          <div>
            <div class="page-title">Video Slicer</div>
            <p class="muted">Order Flow Footprint Trading Digest</p>
          </div>
          <button class="btn">← Back to Project</button>
        </header>
        <section class="slicer-layout" style="grid-template-columns:minmax(0,1fr) 340px;">
          <div class="panel">
            <div class="video"><div class="timeline"></div></div>
          </div>
          <aside class="panel">
            <h3>Settings</h3>
            <button class="btn">Preview Slice</button>
            <button class="btn primary">Generate Frames</button>
            <p class="muted">No persistent step indicator.</p>
          </aside>
        </section>
      `, 'dashboard');
    }

    function render() {
      const view = `${state.mode}-${state.screen}`;
      const map = {
        'proposed-dashboard': proposedDashboard,
        'current-dashboard': currentDashboard,
        'proposed-reader': proposedReader,
        'current-reader': currentReader,
        'proposed-slicer': proposedSlicer,
        'current-slicer': currentSlicer
      };
      $('#preview').innerHTML = map[view]();
      updateTabs();
      updatePrompt();
    }

    function updateTabs() {
      $$('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.screen === state.screen));
      $('#mode').value = state.mode;
    }

    function updatePrompt() {
      const target = {
        dashboard: 'frontend/src/app/dashboard/page.tsx',
        reader: 'frontend/src/app/reader/[jobId]/page.tsx',
        slicer: 'frontend/src/app/slicer/[jobId]/page.tsx'
      }[state.screen];

      const copy = {
        dashboard: `Implement the canonical Dashboard proposal in ${target}. Keep the existing jobs API, delete flow, copy handlers, group digest prompt generation, ZIP download URLs, and job.video_url access intact. Replace the current card-heavy action layout with: top Navbar parity, page title "Learning library", stats row (23 Projects, 7 AI digests, selected count, storage), search input, status pills, sort dropdown, and a conditional group digest bar that renders only when selectedGroupIds.length >= 1. Remove the rendered Tailscale URL block from each card; the app only needs one share affordance, so keep Copy Tailscale/Project Link behind the card overflow menu. Card primary action remains "Open Project" and should navigate to /reader/{job.id}. Add a visible "Open YouTube" card action that opens the original job.video_url. Put Copy Link, Download ZIP, Add to Group, and Delete behind the card overflow menu. Use the live job titles and preserve status/kind badges.`,
        reader: `Implement the canonical Reader proposal in ${target}. Keep archive/transcript fetching, polling, copyLearningPrompt, copyProjectLink, AI digest task copy functions, ZIP download, slicer route behavior, and job.video_url intact. Change the header to only show kind badge, title, and status. Move actions into one action bar below the title: Copy Learning Prompt, Copy Project Link, Open YouTube, Open Slicer, plus an overflow menu for Copy AI Digest CLI Task, Copy Text-Only AI Digest Task, and Download Project ZIP. Open YouTube should link to the original job.video_url. Use a 250px sticky left chapter index and cap the article column at 72ch. Remove the right action rail. Render chapter titles as plain concept names and move Improve images / curated-remove controls into a small footer toolbar below each chapter summary.`,
        slicer: `Implement the canonical Slicer proposal in ${target}. Keep existing job loading, video source resolution, preview/finalize/save handlers, frame selection, return routing, and toast behavior intact. Add a persistent 3-step indicator at the top: 1. Set range, 2. Review frames, 3. Done. Use the review state as the most distinctive layout, keep the video area wide, tighten the right Format panel to about 260px, and fix the visible label from "Expert Ready!" to "Export Ready!". Current baseline has no step indicator; the proposed UI should make workflow state explicit without changing the API contract.`
      }[state.screen];

      $('#prompt').value = copy;
    }

    $$('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        state.screen = tab.dataset.screen;
        render();
      });
    });

    $('#mode').addEventListener('change', (event) => {
      state.mode = event.target.value;
      render();
    });

    $('#copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText($('#prompt').value);
      $('#copyStatus').textContent = 'Copied';
      setTimeout(() => { $('#copyStatus').textContent = ''; }, 1400);
    });

    render();
  </script>
</body>
</html>
